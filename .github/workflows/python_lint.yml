name: Run Ruff Linting and Formatting

on:
  workflow_call:

jobs:
  python_lint:
    name: Python Linting and Formatting checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version-file: .python-version
    - name: Install uv
      uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
    - name: Install linting requirements
      run: uv sync --locked --group linting
    - name: Run Python linting check
      run: uv run ruff check --no-fix --output-format github
    - name: Run Python formatting check
      run: uv run ruff format --diff
